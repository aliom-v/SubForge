openapi: 3.1.0
info:
  title: SubForge API
  version: 0.1.0
  summary: SubForge 管理后台与公开订阅接口规范
  description: |
    这是 SubForge 当前 Worker 暴露的正式 OpenAPI 规范入口。

    约定：
    - 除 `/health`、`/api/setup/status`、`/api/setup/bootstrap`、`/api/admin/login`、`/s/{token}/{target}` 外，其余 `/api/*` 接口默认要求 `Authorization: Bearer <admin-session-token>`。
    - JSON API 默认使用统一包裹：成功为 `{ "ok": true, "data": ... }`，失败为 `{ "ok": false, "error": ... }`。
    - 更详细的错误码、缓存头、限流头说明见 `docs/API错误码与响应头说明.md`。
servers:
  - url: http://127.0.0.1:8787
    description: 本地开发 Worker
  - url: https://{host}
    description: 已部署实例
    variables:
      host:
        default: example.subforge.dev
security:
  - bearerAuth: []
tags:
  - name: System
    description: 健康检查、初始化与基础系统接口
  - name: Admin
    description: 管理员会话接口
  - name: Users
    description: 用户与用户节点绑定管理
  - name: Nodes
    description: 节点 CRUD 与批量导入
  - name: Templates
    description: 订阅模板管理
  - name: RuleSources
    description: 规则源管理与即时同步
  - name: Logs
    description: 同步日志与审计日志
  - name: Cache
    description: 缓存清理与重建
  - name: Preview
    description: 后台订阅预览接口
  - name: Subscription
    description: 公开订阅输出接口
paths:
  /health:
    get:
      tags: [System]
      summary: 健康检查
      description: 返回服务名、当前环境、示例缓存 key 与服务时间。
      operationId: getHealth
      security: []
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthyDevelopment:
                  summary: 本地开发实例健康检查
                  value:
                    ok: true
                    service: SubForge
                    env: development
                    cacheKeyExample: sub:mihomo:demo-token
                    time: '2026-03-09T12:30:00.000Z'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/setup/status:
    get:
      tags: [System]
      summary: 查询初始化状态
      operationId: getSetupStatus
      security: []
      responses:
        '200':
          description: 返回是否已初始化及管理员数量
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatusResponse'
              examples:
                setupNotInitialized:
                  summary: 首次安装前状态
                  value:
                    ok: true
                    data:
                      initialized: false
                      adminCount: 0
                setupInitialized:
                  summary: 已创建管理员后的状态
                  value:
                    ok: true
                    data:
                      initialized: true
                      adminCount: 1
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/setup/bootstrap:
    post:
      tags: [System]
      summary: 首次初始化管理员
      description: 仅在系统尚未创建管理员时可调用，成功后直接返回登录 token。
      operationId: bootstrapSetup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupBootstrapRequest'
            examples:
              firstAdmin:
                summary: 创建首个管理员
                value:
                  username: admin
                  password: changeMe123
      responses:
        '201':
          description: 初始化完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupBootstrapResponse'
              examples:
                bootstrapSuccess:
                  summary: 初始化后直接获得管理员登录态
                  value:
                    ok: true
                    data:
                      initialized: true
                      token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.bootstrap-demo
                      admin:
                        id: admin_01hsetup
                        username: admin
                        role: admin
                        status: active
                        createdAt: '2026-03-09T12:30:00.000Z'
                        updatedAt: '2026-03-09T12:30:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/login:
    post:
      tags: [Admin]
      summary: 管理员登录
      description: |
        使用用户名和密码登录。

        该接口受管理员登录限流保护，成功时会返回清理后的限流头；失败或超限时也会附带限流相关头部。
      operationId: adminLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
            examples:
              loginRequest:
                summary: 管理员登录请求
                value:
                  username: admin
                  password: changeMe123
      responses:
        '200':
          description: 登录成功
          headers:
            x-subforge-rate-limit-scope:
              $ref: '#/components/headers/XSubforgeRateLimitScope'
            x-subforge-rate-limit-cleared:
              $ref: '#/components/headers/XSubforgeRateLimitCleared'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
              examples:
                loginSuccess:
                  summary: 登录成功并清理限流状态
                  value:
                    ok: true
                    data:
                      token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.login-demo
                      admin:
                        id: admin_01hsetup
                        username: admin
                        role: admin
                        status: active
                        createdAt: '2026-03-09T12:30:00.000Z'
                        updatedAt: '2026-03-09T12:35:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/me:
    get:
      tags: [Admin]
      summary: 查询当前管理员
      operationId: getAdminMe
      responses:
        '200':
          description: 当前管理员信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/logout:
    post:
      tags: [Admin]
      summary: 退出登录
      description: '当前语义为服务端撤销：接口会写入会话撤销时间，旧 token 后续访问受保护接口时会返回 `401`。'
      operationId: adminLogout
      responses:
        '200':
          description: 已退出
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
              examples:
                logoutSuccess:
                  summary: 当前管理员会话已被服务端撤销
                  value:
                    ok: true
                    data:
                      loggedOut: true
                      serverRevocation: true
                      mode: server_revoked
                      revokedAt: '2026-03-09T12:40:00.000Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users:
    get:
      tags: [Users]
      summary: 获取用户列表
      operationId: listUsers
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
              examples:
                userList:
                  summary: 含启用与停用用户的列表
                  value:
                    ok: true
                    data:
                      - id: user_01halice
                        name: Alice
                        token: subtoken_alice
                        status: active
                        expiresAt: '2026-12-31T23:59:59.000Z'
                        remark: core user
                        createdAt: '2026-03-08T08:00:00.000Z'
                        updatedAt: '2026-03-09T08:00:00.000Z'
                      - id: user_01hbob
                        name: Bob
                        token: subtoken_bob
                        status: disabled
                        expiresAt: null
                        remark: null
                        createdAt: '2026-03-07T08:00:00.000Z'
                        updatedAt: '2026-03-09T07:00:00.000Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Users]
      summary: 创建用户
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              createUserRequest:
                summary: 创建带到期时间的用户
                value:
                  name: Alice
                  expiresAt: '2026-12-31T23:59:59.000Z'
                  remark: core user
      responses:
        '201':
          description: 用户已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                userCreated:
                  summary: 创建用户并返回订阅 token
                  value:
                    ok: true
                    data:
                      id: user_01halice
                      name: Alice
                      token: subtoken_alice
                      status: active
                      expiresAt: '2026-12-31T23:59:59.000Z'
                      remark: core user
                      createdAt: '2026-03-09T12:40:00.000Z'
                      updatedAt: '2026-03-09T12:40:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{userId}:
    patch:
      tags: [Users]
      summary: 更新用户
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Users]
      summary: 删除用户
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{userId}/reset-token:
    post:
      tags: [Users]
      summary: 重置用户 token
      operationId: resetUserToken
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 返回重置后的用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{userId}/nodes:
    get:
      tags: [Users]
      summary: 查询用户绑定节点
      operationId: listUserNodes
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 用户绑定节点列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNodeBindingListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Users]
      summary: 替换用户绑定节点
      operationId: replaceUserNodes
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceUserNodesRequest'
      responses:
        '200':
          description: 返回绑定结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplaceUserNodesResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/node-import/preview:
    post:
      tags: [Nodes]
      summary: 远程预览节点导入
      description: 拉取远程订阅文本并返回解析结果，不会创建节点或更新远程来源状态。
      operationId: previewNodeImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoteNodeImportRequest'
            examples:
              previewNodeImportRequest:
                summary: 预览远程订阅文本
                value:
                  sourceUrl: https://example.com/sub.txt
      responses:
        '200':
          description: 远程预览结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeImportPreviewResponse'
              examples:
                previewNodeImportSuccess:
                  summary: 成功预览远程订阅文本
                  value:
                    ok: true
                    data:
                      sourceUrl: https://example.com/sub.txt
                      upstreamStatus: 200
                      durationMs: 143
                      fetchedBytes: 512
                      lineCount: 2
                      contentEncoding: plain_text
                      nodes:
                        - name: hk-hy2
                          protocol: hysteria2
                          server: node.example.com
                          port: 443
                          credentials:
                            password: replace-me
                          params:
                            sni: cdn.example.com
                          source: hysteria2://replace-me@node.example.com:443?sni=cdn.example.com#hk-hy2
                      errors: []
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/nodes:
    get:
      tags: [Nodes]
      summary: 获取节点列表
      operationId: listNodes
      responses:
        '200':
          description: 节点列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Nodes]
      summary: 创建节点
      operationId: createNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodeRequest'
            examples:
              createNodeRequest:
                summary: 手动创建带鉴权信息的节点
                value:
                  name: hk-edge-01
                  protocol: socks5
                  server: hk1.example.com
                  port: 1080
                  sourceType: manual
                  enabled: true
                  credentials:
                    username: demo-user
                    password: demo-pass
                  params:
                    udp: true
      responses:
        '201':
          description: 节点已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeResponse'
              examples:
                nodeCreated:
                  summary: 手动节点创建成功
                  value:
                    ok: true
                    data:
                      id: node_01hhk1
                      name: hk-edge-01
                      protocol: socks5
                      server: hk1.example.com
                      port: 1080
                      sourceType: manual
                      sourceId: null
                      enabled: true
                      lastSyncAt: null
                      credentials:
                        username: demo-user
                        password: demo-pass
                      params:
                        udp: true
                      createdAt: '2026-03-09T12:45:00.000Z'
                      updatedAt: '2026-03-09T12:45:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/nodes/import:
    post:
      tags: [Nodes]
      summary: 批量导入节点
      description: '接受 JSON 数组，或形如 `{ "nodes": [...] }` 的对象；单次最多 200 条。'
      operationId: importNodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeImportRequest'
            examples:
              arrayNodeImportPayload:
                summary: 直接传入节点数组
                value:
                  - name: hk-edge-01
                    protocol: socks5
                    server: hk1.example.com
                    port: 1080
                    enabled: true
                  - name: sg-edge-01
                    protocol: vmess
                    server: sg1.example.com
                    port: 443
                    enabled: true
              wrappedNodeImportPayload:
                summary: '使用 `{ nodes: [...] }` 包裹'
                value:
                  nodes:
                    - name: hk-edge-01
                      protocol: socks5
                      server: hk1.example.com
                      port: 1080
                      enabled: true
                    - name: sg-edge-01
                      protocol: vmess
                      server: sg1.example.com
                      port: 443
                      enabled: true
      responses:
        '200':
          description: 导入完成但未产生变更
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeImportResponse'
        '201':
          description: 导入完成且产生变更
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeImportResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/nodes/import/remote:
    post:
      tags: [Nodes]
      summary: 拉取远程节点源并同步
      description: '远端需返回 JSON 数组或 `{"nodes": [...]}`，系统会按节点指纹去重，并禁用当前来源下已过期的远程节点。'
      operationId: importRemoteNodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoteNodeImportRequest'
            examples:
              remoteSourceRequest:
                summary: 拉取一个远程节点 JSON 源
                value:
                  sourceUrl: https://example.com/subforge/nodes.json
      responses:
        '200':
          description: 同步完成但未产生变更
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeImportResponse'
              examples:
                remoteSyncUnchanged:
                  summary: 远程节点源未发生变化
                  value:
                    ok: true
                    data:
                      importedCount: 24
                      importedAt: '2026-03-09T12:50:00.000Z'
                      createdCount: 0
                      updatedCount: 0
                      unchangedCount: 24
                      duplicateCount: 2
                      disabledCount: 0
                      sourceType: remote
                      sourceId: https://example.com/subforge/nodes.json
                      changed: false
        '201':
          description: 同步完成且产生变更
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeImportResponse'
              examples:
                remoteSyncChanged:
                  summary: 远程节点源已更新并禁用旧节点
                  value:
                    ok: true
                    data:
                      importedCount: 24
                      importedAt: '2026-03-09T12:52:00.000Z'
                      createdCount: 3
                      updatedCount: 5
                      unchangedCount: 16
                      duplicateCount: 2
                      disabledCount: 1
                      sourceType: remote
                      sourceId: https://example.com/subforge/nodes.json
                      changed: true
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/nodes/{nodeId}:
    patch:
      tags: [Nodes]
      summary: 更新节点
      operationId: updateNode
      parameters:
        - $ref: '#/components/parameters/NodeIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNodeRequest'
      responses:
        '200':
          description: 更新后的节点
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Nodes]
      summary: 删除节点
      operationId: deleteNode
      parameters:
        - $ref: '#/components/parameters/NodeIdPath'
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteNodeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/templates:
    get:
      tags: [Templates]
      summary: 获取模板列表
      operationId: listTemplates
      responses:
        '200':
          description: 模板列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Templates]
      summary: 创建模板
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
            examples:
              createTemplateRequest:
