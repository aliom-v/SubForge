  /s/{token}/{target}:
    get:
      tags: [Subscription]
      summary: 获取公开订阅
      description: |
        返回订阅原文，而不是统一 JSON 包裹。

        - `mihomo` 返回 `text/yaml; charset=utf-8`
        - `singbox` 返回 `application/json; charset=utf-8`
      operationId: getPublicSubscription
      security: []
      parameters:
        - $ref: '#/components/parameters/TokenPath'
        - $ref: '#/components/parameters/TargetPath'
      responses:
        '200':
          description: 订阅原文
          headers:
            x-subforge-rate-limit-scope:
              $ref: '#/components/headers/XSubforgeRateLimitScope'
            x-subforge-rate-limit-limit:
              $ref: '#/components/headers/XSubforgeRateLimitLimit'
            x-subforge-rate-limit-remaining:
              $ref: '#/components/headers/XSubforgeRateLimitRemaining'
            x-subforge-rate-limit-reset:
              $ref: '#/components/headers/XSubforgeRateLimitReset'
            x-subforge-cache:
              $ref: '#/components/headers/XSubforgeCache'
            x-subforge-cache-key:
              $ref: '#/components/headers/XSubforgeCacheKey'
            x-subforge-cache-scope:
              $ref: '#/components/headers/XSubforgeSubscriptionCacheScope'
          content:
            text/yaml:
              schema:
                type: string
              examples:
                mihomoSubscription:
                  summary: Mihomo 订阅原文
                  value: |
                    proxies:
                      - name: hk-edge-01
                        type: socks5
                        server: hk1.example.com
                        port: 1080
                    proxy-groups:
                      - name: auto
                        type: select
                        proxies:
                          - hk-edge-01
                    rules:
                      - MATCH,auto
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                singboxSubscription:
                  summary: sing-box 订阅原文
                  value:
                    outbounds:
                      - type: socks
                        tag: hk-edge-01
                        server: hk1.example.com
                        server_port: 1080
                    route:
                      rules:
                        - outbound: hk-edge-01
                          network: tcp,udp
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserIdPath:
      name: userId
      in: path
      required: true
      description: 用户 ID
      schema:
        type: string
    NodeIdPath:
      name: nodeId
      in: path
      required: true
      description: 节点 ID
      schema:
        type: string
    TemplateIdPath:
      name: templateId
      in: path
      required: true
      description: 模板 ID
      schema:
        type: string
    RuleSourceIdPath:
      name: ruleSourceId
      in: path
      required: true
      description: 规则源 ID
      schema:
        type: string
    TokenPath:
      name: token
      in: path
      required: true
      description: 用户公开订阅 token
      schema:
        type: string
    TargetPath:
      name: target
      in: path
      required: true
      description: 订阅目标类型
      schema:
        $ref: '#/components/schemas/SubscriptionTarget'
  headers:
    XSubforgeRateLimitScope:
      description: 限流作用域
      schema:
        type: string
        examples: [admin_login, subscription]
    XSubforgeRateLimitCleared:
      description: 登录成功后是否清理登录限流状态
      schema:
        type: string
        enum: ['true']
    XSubforgeRateLimitLimit:
      description: 限流窗口上限
      schema:
        type: string
    XSubforgeRateLimitRemaining:
      description: 限流窗口剩余额度
      schema:
        type: string
    XSubforgeRateLimitReset:
      description: 限流窗口重置时间
      schema:
        type: string
        format: date-time
    RetryAfter:
      description: 距离可重试的秒数
      schema:
        type: string
    XSubforgePreviewCache:
      description: 预览缓存命中状态
      schema:
        type: string
        enum: [hit, miss]
    XSubforgeCache:
      description: 公开订阅缓存命中状态
      schema:
        type: string
        enum: [hit, miss]
    XSubforgeCacheKey:
      description: 当前响应对应的缓存 key
      schema:
        type: string
    XSubforgePreviewCacheScope:
      description: 预览缓存作用域
      schema:
        type: string
        enum: [preview]
    XSubforgeSubscriptionCacheScope:
      description: 公开订阅缓存作用域
      schema:
        type: string
        enum: [subscription]
  responses:
    BadRequestError:
      description: 参数校验失败、业务规则不满足或目标类型不支持
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            invalidJsonBody:
              summary: 请求体不是合法 JSON
              value:
                ok: false
                error:
                  code: VALIDATION_FAILED
                  message: request body must be valid JSON
            unsupportedTarget:
              summary: 订阅目标类型不支持
              value:
                ok: false
                error:
                  code: UNSUPPORTED_TARGET
                  message: unsupported subscription target
    UnauthorizedError:
      description: 缺少或无效 Bearer token，或登录凭证错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            missingBearerToken:
              summary: 缺少管理员 Bearer token
              value:
                ok: false
                error:
                  code: UNAUTHORIZED
                  message: missing bearer token
            invalidAdminSession:
              summary: Bearer token 无效
              value:
                ok: false
                error:
                  code: UNAUTHORIZED
                  message: invalid admin session token
    ForbiddenError:
      description: 当前操作被禁止，例如初始化已完成后再次 bootstrap
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            setupAlreadyCompleted:
              summary: 初始化已完成后再次 bootstrap
              value:
                ok: false
                error:
                  code: FORBIDDEN
                  message: setup has already been completed
            adminUnavailable:
              summary: 管理员账号不可用
              value:
                ok: false
                error:
                  code: FORBIDDEN
                  message: admin account is unavailable
    NotFoundError:
      description: 资源或路由不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            noRouteMatched:
              summary: 路由不存在
              value:
                ok: false
                error:
                  code: NOT_FOUND
                  message: No route matches /api/not-exists
            previewDataNotFound:
              summary: 预览数据不存在
              value:
                ok: false
                error:
                  code: NOT_FOUND
                  message: preview data not found
            subscriptionUserNotFound:
              summary: 订阅 token 或模板上下文不存在
              value:
                ok: false
                error:
                  code: SUBSCRIPTION_USER_NOT_FOUND
                  message: subscription token or template not found
    TooManyRequestsError:
      description: 登录或公开订阅请求超过频率限制
      headers:
        x-subforge-rate-limit-scope:
          $ref: '#/components/headers/XSubforgeRateLimitScope'
        x-subforge-rate-limit-limit:
          $ref: '#/components/headers/XSubforgeRateLimitLimit'
        x-subforge-rate-limit-remaining:
          $ref: '#/components/headers/XSubforgeRateLimitRemaining'
        x-subforge-rate-limit-reset:
          $ref: '#/components/headers/XSubforgeRateLimitReset'
        retry-after:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            tooManyLoginAttempts:
              summary: 管理员登录超限
              value:
                ok: false
                error:
                  code: TOO_MANY_REQUESTS
                  message: too many login attempts, please retry later
                  details:
                    scope: admin_login
                    limit: 5
                    remaining: 0
                    retryAfterSec: 600
                    resetAt: '2026-03-09T12:40:00.000Z'
                    current: 6
            subscriptionRateLimited:
              summary: 公开订阅请求超限
              value:
                ok: false
                error:
                  code: TOO_MANY_REQUESTS
                  message: subscription request rate limit exceeded
                  details:
                    scope: subscription
                    limit: 60
                    remaining: 0
                    retryAfterSec: 60
                    resetAt: '2026-03-09T12:35:00.000Z'
                    current: 61
    InternalServerError:
      description: Worker 捕获到未归类的运行时异常时返回的结构化 500 错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            internalRuntimeError:
              summary: Worker 内部未归类异常
              value:
                ok: false
                error:
                  code: INTERNAL_ERROR
                  message: internal server error
  schemas:
    ApiSuccessEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data: {}
    ApiErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/AppError'
    AppError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - UNAUTHORIZED
            - FORBIDDEN
            - TOO_MANY_REQUESTS
            - INTERNAL_ERROR
            - VALIDATION_FAILED
            - SUBSCRIPTION_USER_NOT_FOUND
            - USER_DISABLED
            - USER_EXPIRED
            - NO_NODES_AVAILABLE
            - TEMPLATE_NOT_FOUND
            - UNSUPPORTED_TARGET
            - RENDERER_NOT_FOUND
            - TEMPLATE_TARGET_MISMATCH
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    SubscriptionTarget:
      type: string
      enum: [mihomo, singbox]
    UserStatus:
      type: string
      enum: [active, disabled]
    AdminStatus:
      type: string
      enum: [active, disabled]
    AdminRole:
      type: string
      enum: [admin]
    NodeSourceType:
      type: string
      enum: [manual, remote]
    TemplateStatus:
      type: string
      enum: [enabled, disabled]
    RuleSourceFormat:
      type: string
      enum: [yaml, json, text]
    SyncLogStatus:
      type: string
      enum: [success, failed, skipped]
    JsonObject:
      type: object
      additionalProperties: true
    HealthResponse:
      type: object
      required: [ok, service, env, cacheKeyExample, time]
      properties:
        ok:
          type: boolean
          enum: [true]
        service:
          type: string
        env:
          type: string
        cacheKeyExample:
          type: string
        time:
          type: string
          format: date-time
    SetupStatusData:
      type: object
      required: [initialized, adminCount]
      properties:
        initialized:
          type: boolean
        adminCount:
          type: integer
          minimum: 0
    SetupStatusResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SetupStatusData'
    AdminRecord:
      type: object
      required: [id, username, role, status, createdAt]
      properties:
        id:
          type: string
        username:
