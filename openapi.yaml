openapi: 3.1.0
info:
  title: SubForge API
  version: 0.1.0
  summary: SubForge 管理员接口与公开订阅接口规范
  description: |
    这是 SubForge 当前 Worker 暴露的正式 OpenAPI 规范入口。

    约定：
    - 除 `/health`、`/api/setup/status`、`/api/setup/bootstrap`、`/api/admin/login`、`/s/{token}/{target}` 外，其余 `/api/*` 接口默认要求 `Authorization: Bearer <admin-session-token>`。
    - JSON API 默认使用统一包裹：成功为 `{ "ok": true, "data": ... }`，失败为 `{ "ok": false, "error": ... }`。
    - 更详细的错误码、缓存头、限流头说明见 `docs/API错误码与响应头说明.md`。
servers:
  - url: http://127.0.0.1:8787
    description: 本地开发 Worker
  - url: https://{host}
    description: 已部署实例
    variables:
      host:
        default: example.subforge.dev
security:
  - bearerAuth: []
tags:
  - name: System
    description: 健康检查、初始化与基础系统接口
  - name: Admin
    description: 管理员会话接口
  - name: Users
    description: 用户与用户节点绑定管理
  - name: Nodes
    description: 节点 CRUD、批量导入与批量操作
  - name: Templates
    description: 订阅模板管理
  - name: RemoteSubscriptionSources
    description: 托管远程订阅源管理与即时同步
  - name: Preview
    description: 受保护的订阅预览接口
  - name: Subscription
    description: 公开订阅输出接口
paths:
  /health:
    get:
      tags: [System]
      summary: 健康检查
      description: 返回服务名、当前环境、示例缓存 key 与服务时间。
      operationId: getHealth
      security: []
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthyDevelopment:
                  summary: 本地开发实例健康检查
                  value:
                    ok: true
                    service: SubForge
                    env: development
                    cacheKeyExample: sub:mihomo:demo-token
                    time: '2026-03-09T12:30:00.000Z'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/setup/status:
    get:
      tags: [System]
      summary: 查询初始化状态
      operationId: getSetupStatus
      security: []
      responses:
        '200':
          description: 返回是否已初始化及管理员数量
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatusResponse'
              examples:
                setupNotInitialized:
                  summary: 首次安装前状态
                  value:
                    ok: true
                    data:
                      initialized: false
                      adminCount: 0
                setupInitialized:
                  summary: 已创建管理员后的状态
                  value:
                    ok: true
                    data:
                      initialized: true
                      adminCount: 1
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/setup/bootstrap:
    post:
      tags: [System]
      summary: 首次初始化管理员
      description: 仅在系统尚未创建管理员时可调用，成功后直接返回登录 token。
      operationId: bootstrapSetup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupBootstrapRequest'
            examples:
              firstAdmin:
                summary: 创建首个管理员
                value:
                  username: admin
                  password: changeMe123
      responses:
        '201':
          description: 初始化完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupBootstrapResponse'
              examples:
                bootstrapSuccess:
                  summary: 初始化后直接获得管理员登录态
                  value:
                    ok: true
                    data:
                      initialized: true
                      token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.bootstrap-demo
                      admin:
                        id: admin_01hsetup
                        username: admin
                        role: admin
                        status: active
                        createdAt: '2026-03-09T12:30:00.000Z'
                        updatedAt: '2026-03-09T12:30:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/login:
    post:
      tags: [Admin]
      summary: 管理员登录
      description: |
        使用用户名和密码登录。

        该接口受管理员登录限流保护，成功时会返回清理后的限流头；失败或超限时也会附带限流相关头部。
      operationId: adminLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
            examples:
              loginRequest:
                summary: 管理员登录请求
                value:
                  username: admin
                  password: changeMe123
      responses:
        '200':
          description: 登录成功
          headers:
            x-subforge-rate-limit-scope:
              $ref: '#/components/headers/XSubforgeRateLimitScope'
            x-subforge-rate-limit-cleared:
              $ref: '#/components/headers/XSubforgeRateLimitCleared'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
              examples:
                loginSuccess:
                  summary: 登录成功并清理限流状态
                  value:
                    ok: true
                    data:
                      token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.login-demo
                      admin:
                        id: admin_01hsetup
                        username: admin
                        role: admin
                        status: active
                        createdAt: '2026-03-09T12:30:00.000Z'
                        updatedAt: '2026-03-09T12:35:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/me:
    get:
      tags: [Admin]
      summary: 查询当前管理员
      operationId: getAdminMe
      responses:
        '200':
          description: 当前管理员信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/logout:
    post:
      tags: [Admin]
      summary: 退出登录
      description: '当前语义为服务端撤销：接口会写入会话撤销时间，旧 token 后续访问受保护接口时会返回 `401`。'
      operationId: adminLogout
      responses:
        '200':
          description: 已退出
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
              examples:
                logoutSuccess:
                  summary: 当前管理员会话已被服务端撤销
                  value:
                    ok: true
                    data:
                      loggedOut: true
                      serverRevocation: true
                      mode: server_revoked
                      revokedAt: '2026-03-09T12:40:00.000Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users:
    get:
      tags: [Users]
      summary: 获取用户列表
      operationId: listUsers
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
              examples:
                userList:
                  summary: 含启用与停用用户的列表
                  value:
                    ok: true
                    data:
                      - id: user_01halice
                        name: Alice
                        token: subtoken_alice
                        status: active
                        expiresAt: '2026-12-31T23:59:59.000Z'
                        remark: core user
                        createdAt: '2026-03-08T08:00:00.000Z'
                        updatedAt: '2026-03-09T08:00:00.000Z'
                      - id: user_01hbob
                        name: Bob
                        token: subtoken_bob
                        status: disabled
                        expiresAt: null
                        remark: null
                        createdAt: '2026-03-07T08:00:00.000Z'
                        updatedAt: '2026-03-09T07:00:00.000Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Users]
      summary: 创建用户
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              createUserRequest:
                summary: 创建带到期时间的用户
                value:
                  name: Alice
                  expiresAt: '2026-12-31T23:59:59.000Z'
                  remark: core user
      responses:
        '201':
          description: 用户已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                userCreated:
                  summary: 创建用户并返回订阅 token
                  value:
                    ok: true
                    data:
                      id: user_01halice
                      name: Alice
                      token: subtoken_alice
                      status: active
                      expiresAt: '2026-12-31T23:59:59.000Z'
                      remark: core user
                      createdAt: '2026-03-09T12:40:00.000Z'
                      updatedAt: '2026-03-09T12:40:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{userId}:
    patch:
      tags: [Users]
      summary: 更新用户
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Users]
      summary: 删除用户
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{userId}/reset-token:
    post:
      tags: [Users]
      summary: 重置用户 token
      operationId: resetUserToken
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 返回重置后的用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/hosted-subscription/reset-token:
    post:
      tags: [Users]
      summary: 重置当前托管订阅 token
      description: |
        重置系统自动维护的单用户托管身份 token。

        旧的 `/s/{token}/{target}` 链接会立即失效，客户端需要改用新的托管 URL。
      operationId: resetHostedSubscriptionToken
      responses:
        '200':
          description: 返回重置后的托管用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{userId}/nodes:
    get:
      tags: [Users]
      summary: 查询用户绑定节点
      operationId: listUserNodes
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 用户绑定节点列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNodeBindingListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Users]
      summary: 替换用户绑定节点
      operationId: replaceUserNodes
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceUserNodesRequest'
      responses:
        '200':
          description: 返回绑定结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplaceUserNodesResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/node-import/preview:
    post:
      tags: [Nodes]
      summary: 远程预览节点导入
      description: 拉取远程订阅文本并返回解析结果，不会创建节点或更新远程来源状态。
      operationId: previewNodeImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoteNodeImportRequest'
            examples:
              previewNodeImportRequest:
                summary: 预览远程订阅文本
                value:
                  sourceUrl: https://example.com/sub.txt
      responses:
        '200':
          description: 远程预览结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeImportPreviewResponse'
              examples:
                previewNodeImportSuccess:
                  summary: 成功预览远程订阅文本
                  value:
                    ok: true
                    data:
                      sourceUrl: https://example.com/sub.txt
                      upstreamStatus: 200
                      durationMs: 143
                      fetchedBytes: 512
                      lineCount: 2
                      contentEncoding: plain_text
                      nodes:
                        - name: hk-hy2
                          protocol: hysteria2
                          server: node.example.com
                          port: 443
                          credentials:
                            password: replace-me
                          params:
                            sni: cdn.example.com
                          source: hysteria2://replace-me@node.example.com:443?sni=cdn.example.com#hk-hy2
                      errors: []
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/nodes:
    get:
      tags: [Nodes]
      summary: 获取节点列表
      operationId: listNodes
      responses:
        '200':
          description: 节点列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Nodes]
      summary: 创建节点
      operationId: createNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodeRequest'
            examples:
              createNodeRequest:
                summary: 手动创建带鉴权信息的节点
                value:
                  name: hk-edge-01
                  protocol: socks5
                  server: hk1.example.com
                  port: 1080
                  sourceType: manual
                  enabled: true
                  credentials:
                    username: demo-user
                    password: demo-pass
                  params:
                    udp: true
      responses:
        '201':
          description: 节点已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeResponse'
              examples:
                nodeCreated:
                  summary: 手动节点创建成功
                  value:
                    ok: true
                    data:
                      id: node_01hhk1
                      name: hk-edge-01
                      protocol: socks5
                      server: hk1.example.com
                      port: 1080
                      sourceType: manual
                      sourceId: null
                      enabled: true
                      lastSyncAt: null
                      credentials:
                        username: demo-user
                        password: demo-pass
                      params:
                        udp: true
                      createdAt: '2026-03-09T12:45:00.000Z'
                      updatedAt: '2026-03-09T12:45:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/nodes/import:
    post:
      tags: [Nodes]
      summary: 批量导入节点
      description: '接受 JSON 数组，或形如 `{ "nodes": [...] }` 的对象；单次最多 200 条。'
      operationId: importNodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeImportRequest'
            examples:
              arrayNodeImportPayload:
                summary: 直接传入节点数组
                value:
                  - name: hk-edge-01
                    protocol: socks5
                    server: hk1.example.com
                    port: 1080
                    enabled: true
                  - name: sg-edge-01
                    protocol: vmess
                    server: sg1.example.com
                    port: 443
                    enabled: true
              wrappedNodeImportPayload:
                summary: '使用 `{ nodes: [...] }` 包裹'
                value:
                  nodes:
                    - name: hk-edge-01
                      protocol: socks5
                      server: hk1.example.com
                      port: 1080
                      enabled: true
                    - name: sg-edge-01
                      protocol: vmess
                      server: sg1.example.com
                      port: 443
                      enabled: true
      responses:
        '200':
          description: 导入完成但未产生变更
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeImportResponse'
        '201':
          description: 导入完成且产生变更
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeImportResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/nodes/batch:
    post:
      tags: [Nodes]
      summary: 批量修改节点
      description: 批量启用、禁用或删除节点。提交前会校验节点存在性，并阻止会破坏链式代理引用关系的变更。
      operationId: mutateNodesBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeBatchMutationRequest'
            examples:
              disableNodes:
                summary: 批量禁用节点
                value:
                  action: set_enabled
                  nodeIds:
                    - node_hk_01
                    - node_sg_01
                  enabled: false
              deleteNodes:
                summary: 批量删除节点
                value:
                  action: delete
                  nodeIds:
                    - node_hk_01
                    - node_sg_01
      responses:
        '200':
          description: 批量变更结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeBatchMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/nodes/{nodeId}:
    patch:
      tags: [Nodes]
      summary: 更新节点
      operationId: updateNode
      parameters:
        - $ref: '#/components/parameters/NodeIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNodeRequest'
      responses:
        '200':
          description: 更新后的节点
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Nodes]
      summary: 删除节点
      operationId: deleteNode
      parameters:
        - $ref: '#/components/parameters/NodeIdPath'
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteNodeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/templates:
    get:
      tags: [Templates]
      summary: 获取模板列表
      operationId: listTemplates
      responses:
        '200':
          description: 模板列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Templates]
      summary: 创建模板
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
            examples:
              createTemplateRequest:
                summary: 创建 Mihomo 默认模板
                value:
                  name: mihomo-default
                  targetType: mihomo
                  content: |
                    proxies:
                    {{proxies}}
                    proxy-groups:
                    {{proxy_groups}}
                    rules:
                    {{rules}}
                  version: 1
                  isDefault: true
                  enabled: true
      responses:
        '201':
          description: 模板已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
              examples:
                templateCreated:
                  summary: 模板创建成功
                  value:
                    ok: true
                    data:
                      id: tpl_01hmihomo
                      name: mihomo-default
                      targetType: mihomo
                      content: |
                        proxies:
                        {{proxies}}
                        proxy-groups:
                        {{proxy_groups}}
                        rules:
                        {{rules}}
                      version: 1
                      isDefault: true
                      status: enabled
                      createdAt: '2026-03-09T13:00:00.000Z'
                      updatedAt: '2026-03-09T13:00:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/templates/{templateId}:
    patch:
      tags: [Templates]
      summary: 更新模板
      operationId: updateTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: 更新后的模板
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Templates]
      summary: 删除模板
      operationId: deleteTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteTemplateResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/templates/{templateId}/set-default:
    post:
      tags: [Templates]
      summary: 设为默认模板
      operationId: setDefaultTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      responses:
        '200':
          description: 已切换默认模板
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/remote-subscription-sources:
    get:
      tags: [RemoteSubscriptionSources]
      summary: 获取远程订阅源列表
      operationId: listRemoteSubscriptionSources
      responses:
        '200':
          description: 远程订阅源列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoteSubscriptionSourceListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [RemoteSubscriptionSources]
      summary: 创建远程订阅源
      description: 保存一个上游订阅 URL 作为托管同步来源；`name` 省略时默认取 URL hostname。
      operationId: createRemoteSubscriptionSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRemoteSubscriptionSourceRequest'
            examples:
              createRemoteSubscriptionSourceRequest:
                summary: 创建一个可自动拉取的订阅来源
                value:
                  name: demo-airport
                  sourceUrl: https://example.com/sub.txt
                  enabled: true
      responses:
        '201':
          description: 远程订阅源已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoteSubscriptionSourceResponse'
              examples:
                remoteSubscriptionSourceCreated:
                  summary: 远程订阅源创建成功
                  value:
                    ok: true
                    data:
                      id: rss_01hsub
                      name: demo-airport
                      sourceUrl: https://example.com/sub.txt
                      enabled: true
                      lastSyncAt: null
                      lastSyncStatus: null
                      failureCount: 0
                      createdAt: '2026-03-09T13:06:00.000Z'
                      updatedAt: '2026-03-09T13:06:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/remote-subscription-sources/{sourceId}:
    patch:
      tags: [RemoteSubscriptionSources]
      summary: 更新远程订阅源
      operationId: updateRemoteSubscriptionSource
      parameters:
        - $ref: '#/components/parameters/RemoteSubscriptionSourceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRemoteSubscriptionSourceRequest'
      responses:
        '200':
          description: 更新后的远程订阅源
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoteSubscriptionSourceResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [RemoteSubscriptionSources]
      summary: 删除远程订阅源
      description: 删除来源时会移除该来源下的远程节点，并刷新受影响用户的节点绑定与订阅缓存。
      operationId: deleteRemoteSubscriptionSource
      parameters:
        - $ref: '#/components/parameters/RemoteSubscriptionSourceIdPath'
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRemoteSubscriptionSourceResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/remote-subscription-sources/{sourceId}/sync:
    post:
      tags: [RemoteSubscriptionSources]
      summary: 立即同步远程订阅源
      description: 拉取上游订阅文本、解析节点并刷新该来源下的远程节点。同步失败时也会返回 `200`，并在 `status` 与 `details` 里给出结构化诊断。
      operationId: syncRemoteSubscriptionSource
      parameters:
        - $ref: '#/components/parameters/RemoteSubscriptionSourceIdPath'
      responses:
        '200':
          description: 同步结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoteSubscriptionSourceSyncResponse'
              examples:
                remoteSubscriptionSourceSyncUpdated:
                  summary: 远程订阅节点已更新
                  value:
                    ok: true
                    data:
                      sourceId: rss_01hsub
                      sourceName: demo-airport
                      sourceUrl: https://example.com/sub.txt
                      status: success
                      message: subscription updated (18 nodes)
                      changed: true
                      importedAt: '2026-03-09T13:10:00.000Z'
                      importedCount: 18
                      createdCount: 2
                      updatedCount: 4
                      unchangedCount: 12
                      duplicateCount: 1
                      disabledCount: 0
                      errorCount: 0
                      lineCount: 18
                      contentEncoding: plain_text
                      details:
                        sourceUrl: https://example.com/sub.txt
                        durationMs: 328
                        upstreamStatus: 200
                        fetchedBytes: 4096
                        contentType: text/plain; charset=utf-8
                        lineCount: 18
                        contentEncoding: plain_text
                        importedCount: 18
                        createdCount: 2
                        updatedCount: 4
                        unchangedCount: 12
                        duplicateCount: 1
                        disabledCount: 0
                        errorCount: 0
                remoteSubscriptionSourceSyncFailed:
                  summary: 上游返回空内容
                  value:
                    ok: true
                    data:
                      sourceId: rss_01hsub
                      sourceName: demo-airport
                      sourceUrl: https://example.com/sub.txt
                      status: failed
                      message: upstream content is empty
                      changed: false
                      importedAt: '2026-03-09T13:12:00.000Z'
                      importedCount: 0
                      createdCount: 0
                      updatedCount: 0
                      unchangedCount: 0
                      duplicateCount: 0
                      disabledCount: 0
                      errorCount: 0
                      lineCount: 0
                      details:
                        sourceUrl: https://example.com/sub.txt
                        durationMs: 147
                        upstreamStatus: 200
                        fetchedBytes: 0
                        contentType: text/plain; charset=utf-8
                        reason: upstream content is empty
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/preview/{userId}/{target}:
    get:
      tags: [Preview]
      summary: 获取受保护的订阅预览
      description: 返回 JSON 包裹，而不是直接返回订阅原文。
      operationId: getPreview
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/TargetPath'
      responses:
        '200':
          description: 预览内容
          headers:
            x-subforge-preview-cache:
              $ref: '#/components/headers/XSubforgePreviewCache'
            x-subforge-cache-key:
              $ref: '#/components/headers/XSubforgeCacheKey'
            x-subforge-cache-scope:
              $ref: '#/components/headers/XSubforgePreviewCacheScope'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
              examples:
                previewMiss:
                  summary: 首次预览命中 miss 并写入缓存
                  value:
                    ok: true
                    data:
                      cacheKey: preview:mihomo:user_01halice
                      mimeType: text/yaml; charset=utf-8
                      content: |
                        proxies:
                          - name: hk-edge-01
                            type: socks5
                            server: hk1.example.com
                            port: 1080
                        proxy-groups:
                          - name: auto
                            type: select
                            proxies:
                              - hk-edge-01
                        rules:
                          - MATCH,auto
                      metadata:
                        userId: user_01halice
                        nodeCount: 1
                        templateName: mihomo-default
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /s/{token}/{target}:
    get:
      tags: [Subscription]
      summary: 获取公开订阅
      description: |
        返回订阅原文，而不是统一 JSON 包裹。

        - `mihomo` 返回 `text/yaml; charset=utf-8`
        - `singbox` 返回 `application/json; charset=utf-8`
      operationId: getPublicSubscription
      security: []
      parameters:
        - $ref: '#/components/parameters/TokenPath'
        - $ref: '#/components/parameters/TargetPath'
      responses:
        '200':
          description: 订阅原文
          headers:
            x-subforge-rate-limit-scope:
              $ref: '#/components/headers/XSubforgeRateLimitScope'
            x-subforge-rate-limit-limit:
              $ref: '#/components/headers/XSubforgeRateLimitLimit'
            x-subforge-rate-limit-remaining:
              $ref: '#/components/headers/XSubforgeRateLimitRemaining'
            x-subforge-rate-limit-reset:
              $ref: '#/components/headers/XSubforgeRateLimitReset'
            x-subforge-cache:
              $ref: '#/components/headers/XSubforgeCache'
            x-subforge-cache-key:
              $ref: '#/components/headers/XSubforgeCacheKey'
            x-subforge-cache-scope:
              $ref: '#/components/headers/XSubforgeSubscriptionCacheScope'
          content:
            text/yaml:
              schema:
                type: string
              examples:
                mihomoSubscription:
                  summary: Mihomo 订阅原文
                  value: |
                    proxies:
                      - name: hk-edge-01
                        type: socks5
                        server: hk1.example.com
                        port: 1080
                    proxy-groups:
                      - name: auto
                        type: select
                        proxies:
                          - hk-edge-01
                    rules:
                      - MATCH,auto
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                singboxSubscription:
                  summary: sing-box 订阅原文
                  value:
                    outbounds:
                      - type: socks
                        tag: hk-edge-01
                        server: hk1.example.com
                        server_port: 1080
                    route:
                      rules:
                        - outbound: hk-edge-01
                          network: tcp,udp
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserIdPath:
      name: userId
      in: path
      required: true
      description: 用户 ID
      schema:
        type: string
    NodeIdPath:
      name: nodeId
      in: path
      required: true
      description: 节点 ID
      schema:
        type: string
    TemplateIdPath:
      name: templateId
      in: path
      required: true
      description: 模板 ID
      schema:
        type: string
    RemoteSubscriptionSourceIdPath:
      name: sourceId
      in: path
      required: true
      description: 远程订阅源 ID
      schema:
        type: string
    TokenPath:
      name: token
      in: path
      required: true
      description: 用户公开订阅 token
      schema:
        type: string
    TargetPath:
      name: target
      in: path
      required: true
      description: 订阅目标类型
      schema:
        $ref: '#/components/schemas/SubscriptionTarget'
  headers:
    XSubforgeRateLimitScope:
      description: 限流作用域
      schema:
        type: string
        examples: [admin_login, subscription]
    XSubforgeRateLimitCleared:
      description: 登录成功后是否清理登录限流状态
      schema:
        type: string
        enum: ['true']
    XSubforgeRateLimitLimit:
      description: 限流窗口上限
      schema:
        type: string
    XSubforgeRateLimitRemaining:
      description: 限流窗口剩余额度
      schema:
        type: string
    XSubforgeRateLimitReset:
      description: 限流窗口重置时间
      schema:
        type: string
        format: date-time
    RetryAfter:
      description: 距离可重试的秒数
      schema:
        type: string
    XSubforgePreviewCache:
      description: 预览缓存命中状态
      schema:
        type: string
        enum: [hit, miss]
    XSubforgeCache:
      description: 公开订阅缓存命中状态
      schema:
        type: string
        enum: [hit, miss]
    XSubforgeCacheKey:
      description: 当前响应对应的缓存 key
      schema:
        type: string
    XSubforgePreviewCacheScope:
      description: 预览缓存作用域
      schema:
        type: string
        enum: [preview]
    XSubforgeSubscriptionCacheScope:
      description: 公开订阅缓存作用域
      schema:
        type: string
        enum: [subscription]
  responses:
    BadRequestError:
      description: 参数校验失败、业务规则不满足或目标类型不支持
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            invalidJsonBody:
              summary: 请求体不是合法 JSON
              value:
                ok: false
                error:
                  code: VALIDATION_FAILED
                  message: request body must be valid JSON
            unsupportedTarget:
              summary: 订阅目标类型不支持
              value:
                ok: false
                error:
                  code: UNSUPPORTED_TARGET
                  message: unsupported subscription target
    UnauthorizedError:
      description: 缺少或无效 Bearer token，或登录凭证错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            missingBearerToken:
              summary: 缺少管理员 Bearer token
              value:
                ok: false
                error:
                  code: UNAUTHORIZED
                  message: missing bearer token
            invalidAdminSession:
              summary: Bearer token 无效
              value:
                ok: false
                error:
                  code: UNAUTHORIZED
                  message: invalid admin session token
    ForbiddenError:
      description: 当前操作被禁止，例如初始化已完成后再次 bootstrap
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            setupAlreadyCompleted:
              summary: 初始化已完成后再次 bootstrap
              value:
                ok: false
                error:
                  code: FORBIDDEN
                  message: setup has already been completed
            adminUnavailable:
              summary: 管理员账号不可用
              value:
                ok: false
                error:
                  code: FORBIDDEN
                  message: admin account is unavailable
    NotFoundError:
      description: 资源或路由不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            noRouteMatched:
              summary: 路由不存在
              value:
                ok: false
                error:
                  code: NOT_FOUND
                  message: No route matches /api/not-exists
            previewDataNotFound:
              summary: 预览数据不存在
              value:
                ok: false
                error:
                  code: NOT_FOUND
                  message: preview data not found
            subscriptionUserNotFound:
              summary: 订阅 token 或模板上下文不存在
              value:
                ok: false
                error:
                  code: SUBSCRIPTION_USER_NOT_FOUND
                  message: subscription token or template not found
    TooManyRequestsError:
      description: 登录或公开订阅请求超过频率限制
      headers:
        x-subforge-rate-limit-scope:
          $ref: '#/components/headers/XSubforgeRateLimitScope'
        x-subforge-rate-limit-limit:
          $ref: '#/components/headers/XSubforgeRateLimitLimit'
        x-subforge-rate-limit-remaining:
          $ref: '#/components/headers/XSubforgeRateLimitRemaining'
        x-subforge-rate-limit-reset:
          $ref: '#/components/headers/XSubforgeRateLimitReset'
        retry-after:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            tooManyLoginAttempts:
              summary: 管理员登录超限
              value:
                ok: false
                error:
                  code: TOO_MANY_REQUESTS
                  message: too many login attempts, please retry later
                  details:
                    scope: admin_login
                    limit: 5
                    remaining: 0
                    retryAfterSec: 600
                    resetAt: '2026-03-09T12:40:00.000Z'
                    current: 6
            subscriptionRateLimited:
              summary: 公开订阅请求超限
              value:
                ok: false
                error:
                  code: TOO_MANY_REQUESTS
                  message: subscription request rate limit exceeded
                  details:
                    scope: subscription
                    limit: 60
                    remaining: 0
                    retryAfterSec: 60
                    resetAt: '2026-03-09T12:35:00.000Z'
                    current: 61
    InternalServerError:
      description: Worker 捕获到未归类的运行时异常时返回的结构化 500 错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorEnvelope'
          examples:
            internalRuntimeError:
              summary: Worker 内部未归类异常
              value:
                ok: false
                error:
                  code: INTERNAL_ERROR
                  message: internal server error
  schemas:
    ApiSuccessEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data: {}
    ApiErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/AppError'
    AppError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - UNAUTHORIZED
            - FORBIDDEN
            - TOO_MANY_REQUESTS
            - INTERNAL_ERROR
            - VALIDATION_FAILED
            - SUBSCRIPTION_USER_NOT_FOUND
            - USER_DISABLED
            - USER_EXPIRED
            - NO_NODES_AVAILABLE
            - TEMPLATE_NOT_FOUND
            - UNSUPPORTED_TARGET
            - RENDERER_NOT_FOUND
            - TEMPLATE_TARGET_MISMATCH
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    SubscriptionTarget:
      type: string
      enum: [mihomo, singbox]
    UserStatus:
      type: string
      enum: [active, disabled]
    AdminStatus:
      type: string
      enum: [active, disabled]
    AdminRole:
      type: string
      enum: [admin]
    NodeSourceType:
      type: string
      enum: [manual, remote]
    TemplateStatus:
      type: string
      enum: [enabled, disabled]
    RemoteSubscriptionSyncStatus:
      type: string
      enum: [success, failed, skipped]
    JsonObject:
      type: object
      additionalProperties: true
    HealthResponse:
      type: object
      required: [ok, service, env, cacheKeyExample, time]
      properties:
        ok:
          type: boolean
          enum: [true]
        service:
          type: string
        env:
          type: string
        cacheKeyExample:
          type: string
        time:
          type: string
          format: date-time
    SetupStatusData:
      type: object
      required: [initialized, adminCount]
      properties:
        initialized:
          type: boolean
        adminCount:
          type: integer
          minimum: 0
    SetupStatusResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SetupStatusData'
    AdminRecord:
      type: object
      required: [id, username, role, status, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
        role:
          $ref: '#/components/schemas/AdminRole'
        status:
          $ref: '#/components/schemas/AdminStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AdminLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    AdminAuthData:
      type: object
      required: [token, admin]
      properties:
        token:
          type: string
        admin:
          $ref: '#/components/schemas/AdminRecord'
    AdminLoginResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessEnvelope'
        - type: object
          properties:
