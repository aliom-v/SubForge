                            server: hk1.example.com
                            port: 1080
                        proxy-groups:
                          - name: auto
                            type: select
                            proxies:
                              - hk-edge-01
                        rules:
                          - MATCH,auto
                      metadata:
                        userId: user_01halice
                        nodeCount: 1
                        ruleSetCount: 1
                        templateName: mihomo-default
        '400':
